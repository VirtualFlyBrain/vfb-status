# VFB service uptime tracker — endpoint definitions.
#
# Each entry probes one public-facing VFB endpoint. Two-state outcome:
# - up:   status in `expect_status` + (optional) response body contains `expect`
# - down: anything else (incl. timeout, TLS error, 4xx/5xx)
#
# Paths are deliberately the public LB-facing path, NOT the internal rancher
# service health-check path (e.g. owlery's internal /health returns 404
# through the public LB; `/` returns 200).
#
# `verify_tls: false` is set where the prod cert SAN doesn't cover the
# subdomain — server is up, cert provisioning is a separate problem.

defaults:
  timeout: 10
  method: GET
  expect_status: [200, 301, 302]
  verify_tls: true

groups:
  - name: Core user-facing
    services:
      - name: virtualflybrain.org (main site)
        url: https://virtualflybrain.org/
        expect: "Virtual Fly Brain"
      - name: www.virtualflybrain.org
        url: https://www.virtualflybrain.org/
        expect: "Virtual Fly Brain"
      - name: v2.virtualflybrain.org (Geppetto app)
        url: https://v2.virtualflybrain.org/org.geppetto.frontend/geppetto
        timeout: 20
      - name: v3.virtualflybrain.org
        url: https://v3.virtualflybrain.org/
      - name: v3-cached.virtualflybrain.org
        url: https://v3-cached.virtualflybrain.org/

  - name: Data + file servers
    services:
      - name: data.virtualflybrain.org (file server)
        url: https://data.virtualflybrain.org/
        # Outage 2026-05-27 — added explicitly. Root listing served by
        # docker-nginx-fileserver; 200/301/403 all mean the server is up.
        expect_status: [200, 301, 302, 403]
      - name: nas0.virtualflybrain.org
        url: https://nas0.virtualflybrain.org/
        verify_tls: false   # cert SAN doesn't cover this hostname
        expect_status: [200, 301, 302, 401, 403]

  - name: APIs
    services:
      - name: PDB Neo4j browser (pdb.virtualflybrain.org)
        url: https://pdb.virtualflybrain.org/browser/
      - name: KB Neo4j browser (kb.virtualflybrain.org)
        url: https://kb.virtualflybrain.org/browser/
      - name: Owlery (owlery.virtualflybrain.org)
        url: https://owlery.virtualflybrain.org/
      - name: Owl cache (owl.virtualflybrain.org)
        url: https://owl.virtualflybrain.org/
        timeout: 20
      - name: SOLR (solr.virtualflybrain.org)
        url: https://solr.virtualflybrain.org/solr/ontology/select?q=*:*&rows=0&wt=json
        expect: "responseHeader"
      - name: VFBquery (vfbquery.virtualflybrain.org)
        url: https://vfbquery.virtualflybrain.org/
        expect_status: [200, 301, 302, 404]
      - name: api.virtualflybrain.org
        url: https://api.virtualflybrain.org/
        expect_status: [200, 301, 302, 404]
      - name: VFB3 MCP (vfb3-mcp.virtualflybrain.org)
        url: https://vfb3-mcp.virtualflybrain.org/
        # MCP server only accepts POST on /; 405 proves the listener is up.
        expect_status: [200, 301, 302, 404, 405]

  - name: Image + NBLAST services
    services:
      - name: IIP3D (iip3d.virtualflybrain.org)
        url: https://iip3d.virtualflybrain.org/
        verify_tls: false   # cert SAN doesn't cover this hostname
        expect_status: [200, 301, 302, 403]
      - name: R / NBLAST on-the-fly (r.virtualflybrain.org)
        url: https://r.virtualflybrain.org/
        timeout: 20
      - name: nblast.virtualflybrain.org
        url: https://nblast.virtualflybrain.org/
        verify_tls: false   # cert SAN doesn't cover this hostname
        expect_status: [200, 301, 302, 403, 404]

  - name: CATMAID hosted instances
    services:
      - name: catmaid.virtualflybrain.org (menu)
        url: https://catmaid.virtualflybrain.org/
        timeout: 20
      - name: fafb.catmaid.virtualflybrain.org
        url: https://fafb.catmaid.virtualflybrain.org/
        timeout: 20
      - name: l1em.catmaid.virtualflybrain.org
        url: https://l1em.catmaid.virtualflybrain.org/
        timeout: 20
      - name: vnc1.catmaid.virtualflybrain.org
        url: https://vnc1.catmaid.virtualflybrain.org/
        timeout: 20
      - name: fanc.catmaid.virtualflybrain.org
        url: https://fanc.catmaid.virtualflybrain.org/
        timeout: 20
      - name: abd1-5.catmaid.virtualflybrain.org
        url: https://abd1-5.catmaid.virtualflybrain.org/
        verify_tls: false   # cert SAN doesn't cover this hostname
        timeout: 20
      - name: l3vnc.catmaid.virtualflybrain.org
        url: https://l3vnc.catmaid.virtualflybrain.org/
        timeout: 20
      - name: iav-tnt.catmaid.virtualflybrain.org
        url: https://iav-tnt.catmaid.virtualflybrain.org/
        timeout: 20
      - name: iav-robo.catmaid.virtualflybrain.org
        url: https://iav-robo.catmaid.virtualflybrain.org/
        timeout: 20
      - name: igor.catmaid.virtualflybrain.org
        url: https://igor.catmaid.virtualflybrain.org/
        timeout: 20

  - name: Auxiliary services
    services:
      - name: larval.virtualflybrain.org
        url: https://larval.virtualflybrain.org/
        expect_status: [200, 301, 302, 403, 404]
      - name: ids.virtualflybrain.org
        url: https://ids.virtualflybrain.org/
        expect_status: [200, 301, 302, 404]
      - name: braintrap.virtualflybrain.org
        url: https://braintrap.virtualflybrain.org/
        expect_status: [200, 301, 302]
      - name: upload.virtualflybrain.org
        url: https://upload.virtualflybrain.org/
        expect_status: [200, 301, 302, 401, 403, 404]

# Caching services. Each entry has TWO probe paths:
#   1. status_url — fallback single-LB probe (used when rancher: isn't set or
#      when the Rancher API call fails).
#   2. rancher:  — if present, enumerate the service's container instances via
#      the Rancher v1 API and probe each container's /status directly. This is
#      the right thing to do for any service with scale > 1 — the LB only ever
#      shows one random backend's view.
#
# Required env on the deployed container for the rancher: paths to work:
#   RANCHER_API_KEY    — environment-scoped Rancher API key (read-only is fine)
#   RANCHER_API_SECRET — secret for the above
#
# The container_port (default 80) is the port the container exposes /status
# on (NOT the rancher LB port). 80 matches the owl_cache image's nginx.
cache_services:
  - name: VFB3 cache (v3-cached.virtualflybrain.org)
    status_url: https://v3-cached.virtualflybrain.org/status
    fronts: vfbquery.virtualflybrain.org
    rancher:
      service_url: https://herd.virtualflybrain.org/v2-beta/projects/1a5/services/1s337
      container_port: 80
      container_path: /status
  - name: Owlery cache (owl.virtualflybrain.org)
    status_url: http://owl.virtualflybrain.org/status
    fronts: owlery (Nico-Pipeline/vfb-owlery)
    rancher:
      service_url: https://herd.virtualflybrain.org/v2-beta/projects/1a5/services/1s336
      container_port: 80
      container_path: /status
  - name: IIP3D cache (iip3d.virtualflybrain.org)
    status_url: http://iip3d.virtualflybrain.org/status
    fronts: iip3d image server
    rancher:
      service_url: https://herd.virtualflybrain.org/v2-beta/projects/1a5/services/1s338
      container_port: 80
      container_path: /status

# Not in cache_services: query-cache-server (1s322) is a SOLR cache, not an
# owl_cache nginx. The existing SOLR entry in groups: already covers it; if
# we want per-instance SOLR metrics later, that needs a different probe shape
# against the Solr admin API.

# Neo4j endpoints — verify both that the database is online AND that it has
# data. Two-stage probe:
#   1. SHOW DATABASES against /db/system  — checks currentStatus == 'online'.
#   2. MATCH (n) RETURN count(n)          — checks count >= min_nodes.
#
# The existing /browser/ entries in groups: only prove the HTTP listener is
# up — they don't catch the case where the load failed and the database is
# empty or offline.
#
# Credentials: VFB publishes the read-only `neo4j` / `vfb` pair as a known
# public credential (vfbconnect docs, tutorials, etc.). It's safe to ship in
# this repo. The env var (`password_env`, default NEO4J_PASSWORD) still wins
# if set on the container, so any future rotation / non-VFB deploy can use
# secrets without touching the YAML.
neo4j_services:
  - name: PDB Neo4j (pdb.virtualflybrain.org)
    base_url: https://pdb.virtualflybrain.org
    db: neo4j
    user: neo4j
    password: vfb                  # public read-only credential
    password_env: NEO4J_PASSWORD   # env wins if set
    min_nodes: 1000000      # PDB docs quote 1.1M+ nodes; alert if below 1M
    timeout: 20
    fronts: Production Database (knowledge graph)
    # Per-container probing — each Neo4j container gets its own
    # SHOW DATABASES + count check against http://<ip>:7474. Catches a
    # single-container divergence (one member offline, stale, or
    # diverged node count) that the LB-fronted check would mask.
    rancher:
      service_url: https://herd.virtualflybrain.org/v2-beta/projects/1a5/services/1s39
      container_port: 7474
      container_scheme: http
  - name: PDB Neo4j — ServerONLY (1s262)
    base_url: https://pdb.virtualflybrain.org   # used only as fallback
    db: neo4j
    user: neo4j
    password: vfb
    password_env: NEO4J_PASSWORD
    min_nodes: 1000000
    timeout: 20
    fronts: Server-only PDB replica (no app sidecar)
    rancher:
      service_url: https://herd.virtualflybrain.org/v2-beta/projects/1a5/services/1s262
      container_port: 7474
      container_scheme: http
  - name: KB Neo4j (kb.virtualflybrain.org)
    base_url: https://kb.virtualflybrain.org
    db: neo4j
    user: neo4j
    password: vfb                  # public read-only credential
    password_env: NEO4J_PASSWORD   # env wins if set
    min_nodes: 1
    timeout: 20
    fronts: Knowledge Base (curation graph)
    # No rancher: block — KB is a single-instance service via LB.

# Application services exposing their own /status JSON (shape: vfbquery, ...).
# Probed on the same schedule as everything else; metrics stored in
# `app_history` and rendered as cards with sparklines on the page.
app_services:
  - name: VFBquery (vfbquery.virtualflybrain.org)
    status_url: https://vfbquery.virtualflybrain.org/status
    shape: vfbquery
    fronts: VFBquery service
    # Same enumeration pattern as cache_services: the LB-fronted /status only
    # shows one random backend's view. Enumerate via the Rancher v1 API and
    # probe each container's /status directly (port 8080 per the vfbquery
    # image). Requires RANCHER_API_KEY / RANCHER_API_SECRET on the container.
    rancher:
      service_url: https://herd.virtualflybrain.org/v2-beta/projects/1a5/services/1s345
      container_port: 8080
      container_path: /status
